<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Português Teste Grátis - Gabarito Max</title>
  <style>
    :root{
      --bg:#05070c;
      --card:#11141b;
      --card2:#171b24;
      --blue:#00f3ff;
      --pink:#ff00e6;
      --green:#39ff14;
      --red:#ff003c;
      --yellow:#ffd400;
      --text:#ffffff;
      --muted:#cfcfcf;
      --line:rgba(255,255,255,.08);
      --lock:#6b7280;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      background:#000;
      color:var(--text);
      min-height:100vh;
      padding:20px 12px 40px;
      text-align:center;
    }

    header{
      max-width:1100px;
      margin:0 auto 24px;
      border:2px solid var(--blue);
      border-radius:24px;
      padding:22px 16px;
      background:linear-gradient(180deg,#0c0f16,#090b11);
      box-shadow:0 0 22px rgba(0,243,255,.22);
    }

    header h1{
      color:var(--blue);
      font-size:clamp(2rem,4vw,3rem);
      text-shadow:0 0 14px rgba(0,243,255,.7);
      font-weight:900;
    }

    header p{
      margin-top:10px;
      color:var(--pink);
      font-weight:800;
      font-size:clamp(1rem,2vw,1.3rem);
    }

    #app{
      width:100%;
      max-width:1100px;
      margin:0 auto;
    }

    .box{
      background:linear-gradient(180deg,var(--card),var(--card2));
      border:1px solid var(--line);
      border-radius:20px;
      padding:20px 16px;
      box-shadow:0 0 20px rgba(0,0,0,.35);
    }

    .btn{
      display:block;
      width:100%;
      max-width:560px;
      margin:10px auto;
      padding:14px 16px;
      border:2px solid var(--blue);
      background:transparent;
      color:#fff;
      border-radius:12px;
      cursor:pointer;
      font-weight:800;
      font-size:1rem;
      transition:.2s;
    }

    .btn:hover:not(:disabled){
      background:var(--blue);
      color:#000;
      box-shadow:0 0 18px rgba(0,243,255,.35);
    }

    .btn-lock{
      border-color:var(--lock);
      color:#d1d5db;
      background:rgba(255,255,255,.03);
    }

    .btn-lock:hover{
      background:rgba(255,255,255,.08);
      color:#fff;
      box-shadow:none;
    }

    .btn-premium{
      border-color:var(--yellow);
      color:var(--yellow);
    }

    .btn-premium:hover:not(:disabled){
      background:var(--yellow);
      color:#000;
      box-shadow:0 0 18px rgba(255,212,0,.35);
    }

    .btn-voltar{
      border-color:#666;
      color:#ddd;
    }

    .btn-voltar:hover:not(:disabled){
      background:#333;
      color:#fff;
      box-shadow:none;
    }

    .btn.correct{
      background:var(--green);
      border-color:var(--green);
      color:#000;
    }

    .btn.wrong{
      background:var(--red);
      border-color:var(--red);
      color:#fff;
    }

    .grid-areas{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:14px;
      margin-top:18px;
    }

    .card-area{
      background:linear-gradient(135deg, rgba(0,243,255,.08), rgba(255,0,230,.08));
      border:1px solid rgba(0,243,255,.16);
      border-radius:16px;
      padding:16px;
      text-align:left;
    }

    .card-area.locked{
      background:linear-gradient(135deg, rgba(107,114,128,.10), rgba(55,65,81,.12));
      border-color:rgba(107,114,128,.25);
    }

    .card-area h3{
      color:var(--blue);
      margin-bottom:8px;
      font-size:1.12rem;
    }

    .card-area.locked h3{
      color:#d1d5db;
    }

    .card-area p{
      color:#ddd;
      font-size:.95rem;
      line-height:1.45;
      margin-bottom:10px;
    }

    .status{
      display:flex;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:18px;
      color:var(--pink);
      font-weight:bold;
    }

    #question-text{
      font-size:1.15rem;
      line-height:1.55;
      margin:20px 0;
      min-height:88px;
    }

    .options-wrap{
      width:100%;
      display:flex;
      flex-direction:column;
      gap:0;
      margin-bottom:10px;
    }

    .result-number{
      font-size:3rem;
      color:var(--blue);
      margin:12px 0;
      font-weight:900;
    }

    .result-sub{
      font-size:1.12rem;
      color:#ddd;
      margin-bottom:10px;
    }

    .mini{
      color:var(--muted);
      font-size:.96rem;
      line-height:1.5;
    }

    .lock-box{
      max-width:780px;
      margin:0 auto;
      background:linear-gradient(135deg, rgba(255,212,0,.10), rgba(255,0,230,.10));
      border:1px solid rgba(255,212,0,.25);
      border-radius:20px;
      padding:28px 18px;
      box-shadow:0 0 20px rgba(255,212,0,.12);
    }

    .lock-box h2{
      color:var(--yellow);
      font-size:2rem;
      margin-bottom:14px;
    }

    .lock-box p{
      color:#f3f4f6;
      line-height:1.6;
      margin-bottom:12px;
    }

    @media (max-width:700px){
      .grid-areas{
        grid-template-columns:1fr;
      }

      #question-text{
        font-size:1.03rem;
      }
    }
  </style>
</head>
<body>

<header>
  <h1>PORTUGUÊS TESTE GRÁTIS</h1>
  <p>TESTE: 2 ÁREAS • 10 QUESTÕES CADA • PREMIUM: 10 MÓDULOS E 200 QUESTÕES</p>
</header>

<div id="app"></div>

<audio id="audio-bg" loop preload="auto" playsinline>
  <source src="https://cdn.pixabay.com/download/audio/2022/01/18/audio_d0a13f69d2.mp3?filename=tension-103701.mp3" type="audio/mpeg">
</audio>

<audio id="audio-correct" preload="auto">
  <source src="https://cdn.pixabay.com/download/audio/2021/08/04/audio_0625c1539c.mp3?filename=success-1-6297.mp3" type="audio/mpeg">
</audio>

<audio id="audio-wrong" preload="auto">
  <source src="https://cdn.pixabay.com/download/audio/2021/08/04/audio_c6ccf3232f.mp3?filename=error-126627.mp3" type="audio/mpeg">
</audio>

<script>
const PREMIUM_URL = "https://pay.kiwify.com.br/QxRaDJy";

const app = document.getElementById("app");
const audioBg = document.getElementById("audio-bg");
const audioCorrect = document.getElementById("audio-correct");
const audioWrong = document.getElementById("audio-wrong");

audioBg.volume = 0.05;
audioCorrect.volume = 0.28;
audioWrong.volume = 0.28;

let audioLiberado = false;
let areaAtual = "";
let questoesAtuais = [];
let indiceQuestao = 0;
let acertosObjetivas = 0;

document.addEventListener("click", destravarAudio, { once: true });
document.addEventListener("touchstart", destravarAudio, { once: true });

function destravarAudio() {
  if (audioLiberado) return;
  audioBg.muted = true;
  audioBg.play().then(() => {
    audioBg.pause();
    audioBg.currentTime = 0;
    audioBg.muted = false;
    audioLiberado = true;
  }).catch(() => {});
}

function tocarAudioFundo() {
  if (!audioLiberado) return;
  audioBg.currentTime = 0;
  audioBg.play().catch(() => {});
}

function pararAudioFundo() {
  audioBg.pause();
  audioBg.currentTime = 0;
}

function tocarAcerto() {
  audioCorrect.currentTime = 0;
  audioCorrect.play().catch(() => {});
}

function tocarErro() {
  audioWrong.currentTime = 0;
  audioWrong.play().catch(() => {});
}

const areas = [
  { nome: "Interpretação de Texto", descricao: "Área liberada no teste grátis.", liberada: true },
  { nome: "Gramática", descricao: "Área liberada no teste grátis.", liberada: true },
  { nome: "Ortografia", descricao: "Disponível apenas na versão premium.", liberada: false },
  { nome: "Pontuação", descricao: "Disponível apenas na versão premium.", liberada: false },
  { nome: "Concordância", descricao: "Disponível apenas na versão premium.", liberada: false },
  { nome: "Regência e Crase", descricao: "Disponível apenas na versão premium.", liberada: false },
  { nome: "Figuras de Linguagem", descricao: "Disponível apenas na versão premium.", liberada: false },
  { nome: "Funções da Linguagem", descricao: "Disponível apenas na versão premium.", liberada: false },
  { nome: "Literatura", descricao: "Disponível apenas na versão premium.", liberada: false },
  { nome: "Redação", descricao: "Disponível apenas na versão premium.", liberada: false }
];

const bancoQuestoes = {
  "Interpretação de Texto": [
    {q:"Em textos argumentativos, a tese corresponde a:",o:["o tema citado","a opinião defendida pelo autor","um exemplo isolado","o título do texto"],c:1},
    {q:"Quando o leitor deduz uma informação não explícita, ocorre:",o:["cópia","inferência","contradição","paródia"],c:1},
    {q:"A finalidade principal de um anúncio publicitário é:",o:["narrar","descrever","convencer","resumir"],c:2},
    {q:"Linguagem verbal utiliza:",o:["somente imagens","palavras","apenas gestos","símbolos"],c:1},
    {q:"Humor por contraste entre expectativa e realidade pode gerar:",o:["ironia","denotação","aliteração","paráfrase"],c:0},
    {q:"Em texto informativo, a linguagem tende a ser:",o:["vaga","objetiva","musical","ambígua"],c:1},
    {q:"A ideia principal do parágrafo normalmente gira em torno de:",o:["detalhe aleatório","informação central","apenas o título","imagem"],c:1},
    {q:"Concluir algo a partir de pistas textuais exige:",o:["pontuação","morfologia","interpretação","ortografia"],c:2},
    {q:"Num texto opinativo, os argumentos servem para:",o:["enfeitar","confundir","sustentar a tese","trocar a ortografia"],c:2},
    {q:"O contexto ajuda a definir:",o:["ordem alfabética","sentido das palavras","origem latina","pontuação"],c:1}
  ],
  "Gramática": [
    {q:"Na frase 'Os alunos chegaram cedo', o núcleo do sujeito é:",o:["os","alunos","chegaram","cedo"],c:1},
    {q:"Verbo indica principalmente:",o:["ação/estado/fenômeno","nome","qualidade","ligação"],c:0},
    {q:"Substantivo é a palavra que nomeia:",o:["ações","seres e ideias","qualidades","conjunções"],c:1},
    {q:"Adjetivo é a palavra que:",o:["nomeia","modifica verbo","caracteriza substantivo","liga orações"],c:2},
    {q:"Pronome é a palavra que:",o:["substitui/acompanha o nome","indica ação","expressa intensidade","marca pontuação"],c:0},
    {q:"Na frase 'Maria está feliz', o predicado é:",o:["Maria","está","feliz","está feliz"],c:3},
    {q:"Sujeito oculto ocorre quando:",o:["não existe verbo","pode ser identificado pela desinência","o verbo está no infinitivo","não há oração"],c:1},
    {q:"Objeto direto é o complemento que:",o:["vem com preposição","não exige preposição obrigatória","indica lugar","funciona como sujeito"],c:1},
    {q:"Advérbio modifica:",o:["substantivo","verbo/adjetivo/outro advérbio","pronome","artigo"],c:1},
    {q:"Artigo é a palavra que:",o:["substitui nome","determina o substantivo","liga orações","indica ação"],c:1}
  ]
};

function irParaPremium() {
  if (!PREMIUM_URL || PREMIUM_URL.includes("COLE_AQUI")) {
    alert("Link premium não configurado.");
    return;
  }
  window.open(PREMIUM_URL,"_blank","noopener");
}

function mostrarMenu() {
  pararAudioFundo();

  app.innerHTML = `
    <div class="box">
      <h2 style="color:var(--blue); margin-bottom:8px;">Escolha uma área de Português</h2>
      <p class="mini">No teste grátis você libera <strong>2 áreas com 10 questões cada</strong>. Na versão premium você desbloqueia <strong>10 módulos e 200 questões</strong>.</p>

      <div class="grid-areas">
        ${areas.map(area => `
          <div class="card-area ${area.liberada ? "" : "locked"}">
            <h3>${area.liberada ? area.nome : "🔒 " + area.nome}</h3>
            <p>${area.descricao}</p>
            <button class="btn ${area.liberada ? "" : "btn-lock"}" onclick="${area.liberada ? `iniciarArea('${area.nome.replace(/'/g, "\\'")}')` : `mostrarBloqueio()`}">
              ${area.liberada ? "Entrar nesta área" : "Desbloquear no premium"}
            </button>
          </div>
        `).join("")}
      </div>
    </div>
  `;
}

function mostrarBloqueio() {
  pararAudioFundo();

  app.innerHTML = `
    <div class="lock-box">
      <h2>🔒 ÁREA PREMIUM</h2>
      <p>Essa área está disponível apenas na versão completa do simulado de Português.</p>
      <p>No premium você desbloqueia <strong>10 módulos</strong> e <strong>200 questões completas</strong>.</p>
      <button class="btn btn-premium" onclick="irParaPremium()">LIBERAR ACESSO COMPLETO</button>
      <button class="btn btn-voltar" onclick="mostrarMenu()">VOLTAR AO MENU</button>
    </div>
  `;
}

async function iniciarArea(nomeArea) {
  await destravarAudio();
  areaAtual = nomeArea;
  questoesAtuais = bancoQuestoes[nomeArea] || [];
  indiceQuestao = 0;
  acertosObjetivas = 0;

  if (!questoesAtuais.length) {
    app.innerHTML = `
      <div class="box">
        <h2 style="color:var(--red);">Erro ao abrir a área</h2>
        <button class="btn btn-voltar" onclick="mostrarMenu()">Voltar ao menu</button>
      </div>
    `;
    return;
  }

  setTimeout(() => {
    tocarAudioFundo();
  }, 120);

  carregarQuestao();
}

function carregarQuestao() {
  const questao = questoesAtuais[indiceQuestao];
  const total = questoesAtuais.length;

  let html = `
    <div class="box">
      <div class="status">
        <span>${areaAtual}</span>
        <span>Questão ${indiceQuestao + 1}/${total}</span>
      </div>
      <div id="question-text">${questao.q}</div>
      <div class="options-wrap">
  `;

  questao.o.forEach((alt, idx) => {
    html += `<button class="btn option-btn" onclick="responderObjetiva(${idx})">${alt}</button>`;
  });

  html += `
      </div>
      <button class="btn btn-voltar" onclick="mostrarMenu()">Voltar ao menu</button>
    </div>
  `;

  app.innerHTML = html;
}

function responderObjetiva(escolhida) {
  const questao = questoesAtuais[indiceQuestao];
  const botoes = document.querySelectorAll(".option-btn");

  botoes.forEach((btn, idx) => {
    btn.disabled = true;
    if (idx === questao.c) btn.classList.add("correct");
  });

  if (escolhida === questao.c) {
    acertosObjetivas++;
    tocarAcerto();
  } else {
    botoes[escolhida].classList.add("wrong");
    tocarErro();
  }

  setTimeout(() => {
    indiceQuestao++;
    if (indiceQuestao < questoesAtuais.length) {
      carregarQuestao();
    } else {
      finalizarArea();
    }
  }, 900);
}

function finalizarArea() {
  pararAudioFundo();

  const notaFinal = acertosObjetivas * 10;
  let feedback = "Você concluiu uma amostra do Simulado Português ENEM. A versão premium possui 10 módulos e 200 questões.";

  if (notaFinal >= 80) feedback = "Ótimo resultado no teste grátis. Você já pode avançar para o premium.";
  else if (notaFinal >= 50) feedback = "Bom começo. No premium você treina o restante das áreas.";
  else feedback = "Esse teste já mostrou onde melhorar. O premium ajuda a evoluir com treino completo.";

  app.innerHTML = `
    <div class="box">
      <h2 style="color:var(--blue);">${areaAtual}</h2>
      <div class="result-number">${notaFinal}/100</div>
      <div class="result-sub">Acertos: ${acertosObjetivas}/10</div>
      <p class="mini" style="margin-bottom:18px;">${feedback}</p>

      <button class="btn btn-premium" onclick="irParaPremium()">DESBLOQUEAR VERSÃO COMPLETA</button>
      <button class="btn" onclick="iniciarArea('${areaAtual.replace(/'/g, "\\'")}')">Refazer esta área</button>
      <button class="btn btn-voltar" onclick="mostrarMenu()">Voltar ao menu</button>
    </div>
  `;
}

mostrarMenu();
</script>

</body>
</html>
